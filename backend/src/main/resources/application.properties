# H2 데이터소스 (인메모리)
# CLOSE_DELAY=-1 : 애플리케이션이 동작하는 동안 인메모리 DB가 닫히지 않도록 함.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 콘솔
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL 스크립트 자동 실행(선택: schema.sql, data.sql 사용 시)
spring.sql.init.mode=always

# (선택) SQL 로그 확인
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 파일 기반 H2 (OS 사용자 홈 디렉터리 하위에 저장 예시)
# spring.datasource.url=jdbc:h2:file:~/h2db/testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE


# JPA 관련
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true

# OSIV 비활성화
spring.jpa.open-in-view=false
