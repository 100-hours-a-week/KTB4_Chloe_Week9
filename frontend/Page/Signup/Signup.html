<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 회원가입</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="signup.css" />
</head>
<body>

  <!-- HEADER -->
   <header class="site-header">
    <button class="btn-back" onclick="window.location.href='../Login/Login.html'">&#8249;</button>
    <h1 class="site-title">아무 말 대잔치</h1>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <section class="signup-section">
      <h2 class="signup-title">회원가입</h2>

      <!-- 프로필 사진 영역 -->
      <div class="profile-area">
        <p class="form-label">프로필 사진</p>
        <p class="helper-text" id="profileHelper"></p>
        <div class="profile-upload" id="profileUpload" onclick="document.getElementById('profileInput').click()">
          <img class="profile-preview" id="profilePreview" src="" alt="프로필 사진" style="display:none;" />
          <span class="profile-plus" id="profilePlus">+</span>
        </div>
        <input type="file" id="profileInput" accept="image/*" style="display:none;" />
      </div>

      <!-- 입력 폼 영역 -->
      <div class="form-area">

        <!-- 이메일 -->
        <div class="form-group">
          <label class="form-label" for="email">이메일<span class="required">*</span></label>
          <input class="form-input" type="email" id="email" placeholder="이메일을 입력하세요" />
          <p class="helper-text" id="emailHelper"></p>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <label class="form-label" for="password">비밀번호<span class="required">*</span></label>
          <input class="form-input" type="password" id="password" placeholder="비밀번호를 입력하세요" />
          <p class="helper-text" id="passwordHelper"></p>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="form-group">
          <label class="form-label" for="passwordConfirm">비밀번호 확인<span class="required">*</span></label>
          <input class="form-input" type="password" id="passwordConfirm" placeholder="비밀번호를 한번 더 입력하세요" />
          <p class="helper-text" id="passwordConfirmHelper"></p>
        </div>

        <!-- 닉네임 -->
        <div class="form-group">
          <label class="form-label" for="nickname">닉네임<span class="required">*</span></label>
          <input class="form-input" type="text" id="nickname" placeholder="닉네임을 입력하세요" maxlength="10" />
          <p class="helper-text" id="nicknameHelper"></p>
        </div>

        <!-- 회원가입 버튼 -->
        <button class="btn-submit" id="submitBtn" disabled>회원가입</button>
      </div>

      <!-- 로그인하러 가기 -->
      <div class="login-link-wrap">
        <a href="../Login/Login.html" class="login-link">로그인하러 가기</a>
      </div>

    </section>
  </main>

  <script type="module" src="Signup.js"></script>

</body>
</html>
