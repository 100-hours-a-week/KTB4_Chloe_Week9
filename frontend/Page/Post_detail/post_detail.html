<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 게시글 상세</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="post_detail.css" />
  <link rel="stylesheet" href="../Modal/modal.css" />
</head>
<body>

  <div class="app-layout">

    <!-- SIDEBAR (펼침 상태) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <span class="sidebar-logo">FitMate</span>
        <button class="btn-sidebar-toggle" id="sidebarCollapseBtn" aria-label="사이드바 접기">
          <span class="icon-chevron-left">‹</span>
        </button>
      </div>

      <nav class="sidebar-menu">
        <a href="../Board/board.html" class="sidebar-menu-item">
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          전체 게시글
        </a>
        <button class="sidebar-menu-item" type="button">
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2s4 4.5 4 8.5a4 4 0 0 1-8 0C8 6.5 12 2 12 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 14c0 4 2 8 4 8s4-4 4-8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          인기글
        </button>
        <button class="sidebar-menu-item" type="button">
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          내 활동
        </button>
        <button class="sidebar-menu-item" type="button">
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 10a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 20a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          알림
        </button>
      </nav>

      <div class="sidebar-profile">
        <button class="btn-profile-header" id="profileMenuBtn">
          <img class="profile-icon" src="" alt="프로필" id="headerProfileIcon" />
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="../Profile_edit/profile_edit.html" class="dropdown-item">회원정보수정</a>
          <a href="../Password_edit/password_edit.html" class="dropdown-item">비밀번호수정</a>
          <button class="dropdown-item" id="logoutBtn">로그아웃</button>
        </div>
      </div>
    </aside>

    <!-- 콘텐츠 영역 (접힘 상단바 + 본문) -->
    <div class="content-area">

      <!-- 접힘 상태 상단바 -->
      <div class="collapsed-topbar" id="collapsedTopbar" hidden>
        <button class="btn-sidebar-toggle" id="sidebarExpandBtn" aria-label="사이드바 펼치기">
          <span class="icon-chevron-right">›</span>
        </button>
        <span class="collapsed-logo">FitMate</span>
      </div>

     <!-- MAIN -->
      <main class="main-content">
        <article class="post-detail">

          <!-- 상단 줄: 뒤로가기(좌) + 조회수/수정/삭제(우) -->
          <div class="post-top-row">
            <button class="btn-back-inline" onclick="window.location.href='../Board/board.html'">
              <span class="icon-chevron-left">‹</span> 목록으로
            </button>
            <div class="post-top-right">
              <span class="view-count-inline">
                <svg class="icon-eye" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
                <span id="viewCountNum">0</span>
              </span>
              <button class="btn-action" id="postEditBtn">수정</button>
              <button class="btn-action btn-delete-post" id="postDeleteBtn">삭제</button>
            </div>
          </div>

          <!-- 제목 -->
          <h2 class="post-title"></h2>

          <!-- 작성자 -->
          <div class="post-author-row">
            <div class="author-avatar"></div>
            <span class="author-name"></span>
            <span class="post-date"></span>
          </div>

          <!-- 이미지 영역 (축소된 삽입형) -->
          <div class="post-image-wrap">
            <img class="post-image-placeholder" alt="게시글 이미지" />
          </div>

          <!-- 본문 -->
          <div class="post-body">
          </div>

          <!-- 좋아요(하트, 크게) + 신고 -->
          <div class="post-like-row">
            <button class="btn-like-heart" id="likeBtn">
              <svg class="icon-heart" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 20.5s-7.5-4.6-10-9.3C.5 8 2 4.5 5.5 4c2-.3 3.8.7 4.9 2.2l1.6 2.1 1.6-2.1C14.7 4.7 16.5 3.7 18.5 4 22 4.5 23.5 8 22 11.2c-2.5 4.7-10 9.3-10 9.3z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span id="likeCount">0</span>
            </button>
            <button class="btn-report-inline" id="postReportBtn">신고</button>
          </div>

          <!-- 구분선 -->
          <div class="divider"></div>

          <!-- 댓글 입력 -->
          <div class="comment-input-area">
            <textarea
              class="comment-textarea"
              id="commentTextarea"
              placeholder="댓글을 남겨주세요!"
            ></textarea>
            <div class="comment-submit-row">
              <button class="btn-comment-submit" id="commentSubmitBtn" disabled>댓글 등록</button>
            </div>
          </div>

          <!-- 댓글 개수 -->
          <h3 class="comment-count-heading">댓글 <span id="commentCountHeading">0</span>개</h3>

          <!-- 댓글 목록 -->
          <ul class="comment-list" id="commentList">  </ul>

        </article>
      </main>

    </div>

  </div>

  <!-- 게시글 삭제 모달 -->
  <div class="post_delete_modal" id="postDelete">
    <div class="modal-overlay">
      <div class="modal">
        <h3 class="modal-title">게시글을 삭제하시겠습니까?</h3>
        <p class="modal-desc">삭제한 내용은 복구할 수 없습니다.</p>
        <div class="modal-btns">
          <button class="btn-modal-cancel" id="postDeleteCancel">취소</button>
          <button class="btn-modal-confirm" id="postDeleteConfirm">확인</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 댓글 삭제 모달 -->
  <div class="comment_delete_modal" id="commentDelete">
    <div class="modal-overlay">
      <div class="modal">
        <h3 class="modal-title">댓글을 삭제하시겠습니까?</h3>
        <p class="modal-desc">삭제한 내용은 복구할 수 없습니다.</p>
        <div class="modal-btns">
          <button class="btn-modal-cancel" id="commentDeleteCancel">취소</button>
          <button class="btn-modal-confirm" id="commentDeleteConfirm">확인</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="post_detail.js"></script>

</body>
</html>
