<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 게시글 상세</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="post_detail.css" />
  <link rel="stylesheet" href="../Modal/modal.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <button class="btn-back" onclick="window.location.href='../Board/board.html'">&#8249;</button>
    <h1 class="site-title">아무 말 대잔치</h1>
    <div class="header-profile-wrap">
      <button class="btn-profile-header" id="profileMenuBtn">
        <img class="profile-icon" src="" alt="프로필" id="headerProfileIcon" />
      </button>
      <!-- 드롭다운 메뉴 -->
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="../Profile_edit/profile_edit.html" class="dropdown-item">회원정보수정</a>
        <a href="../Password_edit/password_edit.html" class="dropdown-item">비밀번호수정</a>
        <button class="dropdown-item" id="logoutBtn">로그아웃</button>
      </div>
    </div> 
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <article class="post-detail">

      <!-- 제목 + 작성자 + 수정/삭제 -->
      <div class="post-header">
        <div class="post-header-left">
          <h2 class="post-title"></h2>
          <div class="post-author-row">
            <div class="author-avatar"></div>
            <span class="author-name"></span>
            <span class="post-date"></span>
          </div>
        </div>
        <div class="post-actions">
          <div class="post-actions-top">
            <button class="btn-action" id="postEditBtn">수정</button>
            <button class="btn-action btn-delete-post" id="postDeleteBtn">삭제</button>
          </div>
          <div class="post-actions-bottom">
            <button class="btn-action" id="postReportBtn">신고</button>
          </div>
        </div>
      </div>

    

      <!-- 구분선 -->
      <div class="divider"></div>

      <!-- 이미지 영역 -->
      <div class="post-image-wrap">
        <img class="post-image-placeholder" alt="게시글 이미지" />
      </div>

      <!-- 본문 -->
      <div class="post-body">
      </div>

      <!-- 좋아요 / 조회수 / 댓글 수 -->
      <div class="post-stats">
        <button class="stat-btn like-btn" id="likeBtn">
          <span class="stat-num" id="likeCount"></span>
          <span class="stat-label">좋아요수</span>
        </button>
        <div class="stat-item">
          <span class="stat-num"></span>
          <span class="stat-label">조회수</span>
        </div>
        <div class="stat-item">
          <span class="stat-num"></span>
          <span class="stat-label">댓글</span>
        </div>
      </div>

      <!-- 구분선 -->
      <div class="divider"></div>

      <!-- 댓글 입력 -->
      <div class="comment-input-area">
        <textarea
          class="comment-textarea"
          id="commentTextarea"
          placeholder="댓글을 남겨주세요!"
        ></textarea>
        <div class="comment-submit-row">
          <button class="btn-comment-submit" id="commentSubmitBtn" disabled>댓글 등록</button>
        </div>
      </div>

      <!-- 댓글 목록 -->
      <ul class="comment-list" id="commentList">  </ul>

    </article>
  </main>

  <!-- 게시글 삭제 모달 (modal.css 공유) -->
  <div class="post_delete_modal" id="postDelete">
  <div class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">게시글을 삭제하시겠습니까?</h3>
      <p class="modal-desc">삭제한 내용은 복구할 수 없습니다.</p>
      <div class="modal-btns">
        <button class="btn-modal-cancel" id="postDeleteCancel">취소</button>
        <button class="btn-modal-confirm" id="postDeleteConfirm">확인</button>
      </div>
    </div>
  </div>
</div>

  <!-- 댓글 삭제 모달 (modal.css 공유) -->
  <div class="comment_delete_modal" id="commentDelete">
  <div class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">댓글을 삭제하시겠습니까?</h3>
      <p class="modal-desc">삭제한 내용은 복구할 수 없습니다.</p>
      <div class="modal-btns">
        <button class="btn-modal-cancel" id="commentDeleteCancel">취소</button>
        <button class="btn-modal-confirm" id="commentDeleteConfirm">확인</button>
      </div>
    </div>
  </div>
</div>



  <script type="module" src="post_detail.js"></script>
  
</body>
</html>
