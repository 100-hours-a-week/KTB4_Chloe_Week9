<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitMate- 회원정보수정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="profile_edit.css" />
  <link rel="stylesheet" href="../Modal/modal.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <h1 class="site-title">FitMate</h1>
    <div class="header-profile-wrap">
      <button class="btn-profile-header" id="profileMenuBtn">
        <img class="profile-icon" src="" alt="프로필" id="headerProfileIcon" />
      </button>
      <!-- 드롭다운 메뉴 -->
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="profile_edit.html" class="dropdown-item">회원정보수정</a>
        <a href="../Password_edit/password_edit.html" class="dropdown-item">비밀번호수정</a>
        <button class="dropdown-item" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <section class="edit-section">
      <h2 class="edit-title">회원정보수정</h2>

      <!-- 프로필 사진 -->
      <div class="form-group">
        <label class="form-label">프로필 사진<span class="required">*</span></label>
        <p class="helper-text" id="profileHelper"></p>
        <div class="profile-img-wrap">
          <div class="profile-img-circle" id="profileImgCircle">
            <img class="profile-img-preview" id="profileImgPreview" src="" alt="프로필" style="display:none;" />
            <div class="profile-img-placeholder" id="profileImgPlaceholder"></div>
            <label class="profile-img-overlay" for="profileImgInput">변경</label>
          </div>
          <input type="file" id="profileImgInput" accept="image/*" style="display:none;" />
        </div>
      </div>

      <!-- 이메일 + 닉네임 폼 영역 -->
      <div class="form-card">
        <!-- 이메일 (읽기 전용) -->
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <p class="email-text" id="email"></p>
        </div>

        <!-- 닉네임 -->
        <div class="form-group">
          <label class="form-label" for="nickname">닉네임</label>
          <input
            class="form-input"
            type="text"
            id="nickname"
            maxlength="11"
          />
          <p class="helper-text" id="nicknameHelper"></p>
        </div>

        <!-- 수정하기 버튼 -->
        <button class="btn-submit" id="submitBtn">수정하기</button>

        <!-- 회원 탈퇴 -->
        <button class="btn-withdraw" id="withdrawBtn">회원 탈퇴</button>
      </div>

    </section>
  </main>

  <!-- 수정완료 토스트 -->
  <div class="toast" id="toast">수정완료</div>

  <div class="withdraw_modal" id="withdraw">
  <div class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">회원탈퇴 하시겠습니까?</h3>
      <p class="modal-desc">작성된 게시글과 댓글은 삭제됩니다.</p>
      <div class="modal-btns">
        <button class="btn-modal-cancel" id="withdrawCancel">취소</button>
        <button class="btn-modal-confirm" id="withdrawConfirm">확인</button>
      </div>
    </div>
  </div>
  </div>

  <script type="module" src="profile_edit.js"></script>


</body>
</html>
