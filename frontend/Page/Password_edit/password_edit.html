<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 비밀번호 수정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="password_edit.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <h1 class="site-title">아무 말 대잔치</h1>
    <div class="header-profile-wrap">
      <button class="btn-profile-header" id="profileMenuBtn">
        <img class="profile-icon" src="" alt="프로필" />
      </button>
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="../Profile_edit/profile_edit.html" class="dropdown-item">회원정보수정</a>
        <a href="password_edit.html" class="dropdown-item">비밀번호수정</a>
        <button class="dropdown-item" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <section class="edit-section">
      <h2 class="edit-title">비밀번호 수정</h2>

      <div class="form-card">
        <!-- 비밀번호 -->
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input class="form-input" type="password" id="password" placeholder="비밀번호를 입력하세요" />
          <p class="helper-text" id="passwordHelper"></p>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="form-group">
          <label class="form-label" for="passwordConfirm">비밀번호 확인</label>
          <input class="form-input" type="password" id="passwordConfirm" placeholder="비밀번호를 한번 더 입력하세요" />
          <p class="helper-text" id="passwordConfirmHelper"></p>
        </div>

        <!-- 수정하기 버튼 -->
        <button class="btn-submit" id="submitBtn" disabled>수정하기</button>
      </div>

    </section>
  </main>

  <!-- 수정완료 토스트 -->
  <div class="toast" id="toast">수정완료</div>
  <script type="module" src="password_edit.js"></script>
  
</body>
</html>
