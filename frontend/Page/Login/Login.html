<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitMate-Login</title>

  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

  <!-- Sandoll GogoRound는 공개 CDN이 없으므로 로컬 폴백: 없으면 시스템 폰트 사용 -->
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- ───────────── HEADER ───────────── -->
  <header class="site-header">
    <h1 class="site-title">FitMate</h1>
  </header>

  <!-- ───────────── MAIN ───────────── -->
  <main class="main-content">
    <section class="login-section">
      <div class="login-card">
        <h2 class="login-title">로그인</h2>
        <p class="login-subtitle">다시 만나서 반가워요</p>

        <!-- 폼 영역 -->
        <div class="form-card">
          <div class="form-group">
            <label class="form-label" for="email">이메일</label>
            <input
              class="form-input"
              type="email"
              id="email"
              placeholder="이메일을 입력하세요"
              autocomplete="email"
            />
            <span class="helper-text" id="helperTextEmail">* helper text</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">비밀번호</label>
            <input
              class="form-input"
              type="password"
              id="password"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
            />
            <span class="helper-text" id="helperTextPassword">* helper text</span>
          </div>
        </div>

        <!-- 로그인 버튼 -->
        <button class="btn-login" id="loginBtn" disabled>로그인</button>

        <!-- 회원가입 링크-->
        <div class="signup-wrap">
          <span class="signup-text">계정이 없으신가요?</span>
          <a href="../Signup/signup.html" class="btn-signup">회원가입</a>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="login.js"></script>

</body>
</html>
