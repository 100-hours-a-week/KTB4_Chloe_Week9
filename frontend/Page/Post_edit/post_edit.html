<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 게시글 수정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="post_edit.css" />
</head>
<body>

   <!-- HEADER -->
  <header class="site-header">
    <button class="btn-back" onclick="window.location.href='../Board/board.html'">&#8249;</button>
    <h1 class="site-title">아무 말 대잔치</h1>
    <div class="header-profile-wrap">
      <button class="btn-profile-header" id="profileMenuBtn">
        <img class="profile-icon" src="" alt="프로필" id="headerProfileIcon" />
      </button>
      <!-- 드롭다운 메뉴 -->
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="../Profile_edit/profile_edit.html" class="dropdown-item">회원정보수정</a>
        <a href="../Password_edit/password_edit.html" class="dropdown-item">비밀번호수정</a>
        <button class="dropdown-item" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <section class="write-section">
      <h2 class="write-title">게시글 수정</h2>

      <!-- 제목 -->
      <div class="form-group">
        <label class="form-label" for="postTitle">제목
          <span class="required">*</span>
          <span class="text-count" id="titleCount">0/26</span>
        </label>
        <input
          class="form-input"
          type="text"
          id="postTitle"
          placeholder="제목을 입력해주세요. (최대 26글자)"
          maxlength="26"
        />
      </div>

      <!-- 내용 -->
      <div class="form-group">
        <label class="form-label" for="postContent">내용<span class="required">*</span></label>
        <textarea
          class="form-textarea"
          id="postContent"
        ></textarea>
        <p class="helper-text" id="contentHelper"></p>
      </div>

      <!-- 이미지 -->
      <div class="form-group">
        <label class="form-label">이미지</label>
        <div class="file-input-wrap">
          <label class="btn-file" for="postImage">파일 선택</label>
          <input type="file" id="postImage" accept="image/*" />
          <span class="file-name" id="fileName">기존 파일 명</span>
        </div>
      </div>

      <!-- 수정하기 버튼 -->
      <button class="btn-submit" id="submitBtn" disabled>수정하기</button>

    </section>
  </main>

  <script type="module" src="post_edit.js"></script>
  
</body>
</html>
